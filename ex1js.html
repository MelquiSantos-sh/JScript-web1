<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
<script>
    // Pede o nome ao usuário e armazena na variável "nome"
    let nome = prompt("Digite seu nome:");

    // Pede o sobrenome ao usuário e armazena na variável "sobrenome"
    let sobrenome = prompt("Digite seu sobrenome:");

    // Exibe a mensagem juntando sobrenome + nome
    alert("Olá " + sobrenome + ", " + nome);
</script>
</body>

</html>
