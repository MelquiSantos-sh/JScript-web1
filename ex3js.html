<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
<script>
    // Pede ao usuário o nome de uma cor em inglês
    let cor = prompt("Digite o nome de uma cor em inglês (ex: red, blue, green):");

    // Aplica a cor digitada como cor de fundo da página
    // document.body.style.backgroundColor acessa o estilo CSS do body pelo JavaScript
    document.body.style.backgroundColor = cor;
</script>
</body>

</html>
